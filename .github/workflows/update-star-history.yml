name: Update star history

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-star-history.yml"
      - "tools/generate_star_history.py"
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-star-history
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the default branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate the local chart
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          python tools/generate_star_history.py
          --repository "$GITHUB_REPOSITORY"
          --data assets/star-history.json
          --output assets/star-history.svg

      - name: Commit an updated chart
        shell: bash
        run: |
          if [[ -z "$(git status --porcelain -- assets/star-history.json assets/star-history.svg)" ]]; then
            echo "Star history is unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- assets/star-history.json assets/star-history.svg
          git commit -m "chore: update star history [skip ci]"
          git push
